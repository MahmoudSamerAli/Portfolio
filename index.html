<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mahmoud Samer | Software Engineer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💻</text></svg>">
</head>
<body>

    <div class="boot-loader" id="bootLoader">
      <div class="boot-text">>_ SYSTEM BOOT // CYBERDECK</div>
      <div class="boot-progress">
        <div class="boot-progress-bar" id="bootProgressBar"></div>
      </div>
      <div style="margin-top: 1rem; font-size: 0.8rem; color: #0afff0;">INITIALIZING NEON GRID...</div>
    </div>
    
    <!-- MAIN MENU SCREEN -->
    <div class="screen main-menu" id="mainMenu">
      <div class="main-menu">
        <div class="game-title">◢ CYBER//VAULT ◣</div>
        <div class="game-sub">[ INTERACTIVE PORTFOLIO ]</div>
        <div class="typing-area" id="typingDemo"></div>
        <button class="start-btn" id="startGameBtn">▶ START GAME</button>
        <div style="margin-top: 3rem; font-size: 0.7rem; letter-spacing: 2px;">15 MISSIONS // 15 PROJECTS</div>
      </div>
    </div>
    
    <!-- PROJECT HUB (LEVEL SELECT) -->
    <div class="screen project-hub hidden" id="projectHub">
      <div class="hub-header">
        <div class="hub-title neon-glow">⚡ MISSION BRIEFING // LEVEL SELECT</div>
        <button class="lobby-btn" id="returnLobbyBtn">⟲ RETURN TO LOBBY</button>
      </div>
      <div class="projects-grid" id="projectsGrid"></div>
    </div>
    
    <!-- MODAL FOR PROJECT DETAILS -->
    <div class="modal-overlay" id="projectModal">
      <div class="modal-content">
        <h2 id="modalTitle">PROJECT_NAME</h2>
        <p class="modal-desc" id="modalDesc">Project description will appear here.</p>
        <div class="modal-tech" id="modalTech">Tech Stack: --</div>
        <div class="modal-buttons">
          <a href="#" id="demoLink" target="_blank" class="modal-btn">🖥️ LIVE DEMO</a>
          <a href="#" id="githubLink" target="_blank" class="modal-btn">🐙 GITHUB REPO</a>
        </div>
        <button class="modal-btn close-modal" id="closeModalBtn">◀ BACK TO MISSIONS</button>
      </div>
    </div>

  <script src="script.js"></script>
</body>
</html>
